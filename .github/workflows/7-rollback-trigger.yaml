name: Rollback Trigger
on:
  issues:
    types: [opened]
jobs:
  rollback:
    runs-on: ubuntu-latest
    steps:
      - name: Show issue trigger info
        run: |
          echo "Issue #${{ github.event.issue.number }} opened: ${{ github.event.issue.title }}"
          echo "Please trigger manual rollback workflow_dispatch with desired version."
