name: Deployed
on:
  issue_comment:
    types:
      - created
jobs:
  deploy:
    if: ${{ github.event.issue.pull_request && contains(github.event.comment.body, '/deploy') }}
    uses: BIEL-Datalab/deployments-ci-center/.github/workflows/4-deployed.yaml@project-deploy-my-message
    with:
      pr_num: ${{ github.event.issue.number }}
      gogs_base_url: ${{ vars.GOGS_BASE_URL }}
      gogs_organization: ${{ vars.GOGS_ORGANIZATION }}
      git_sync_user: ${{ vars.GIT_SYNC_USER }}
      git_sync_target_user: ${{ vars.GIT_SYNC_TARGET_USER }}
    secrets: inherit
