name: Before CI
on:
  pull_request_review:
    types: [submitted]
jobs:
  before-ci:
    if: ${{ github.event.review.state == 'approved' }}
    runs-on: self-hosted
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install js-yaml
        run: npm install js-yaml
      - name: Set version from review body
        run: echo "VERSION=${{ github.event.review.body }}" >> $GITHUB_ENV
      - name: Update chart/values.yaml tag
        run: |
          node -e "const fs=require('fs');const yaml=require('js-yaml');const f='chart/values.yaml';const d=yaml.load(fs.readFileSync(f,'utf8'));d.deployment=d.deployment||{};d.deployment.image=d.deployment.image||{};d.deployment.image.tag=process.env.VERSION;fs.writeFileSync(f,yaml.dump(d));"
      - name: Commit changes to PR branch
        run: |
          BRANCH='${{ github.event.pull_request.head.ref }}'
          git config user.email "actions@github.com"
          git config user.name "github-actions[bot]"
          git checkout -B "$BRANCH" '${{ github.event.pull_request.head.sha }}'
          git add chart/values.yaml
          git commit -m "ci: set image tag $VERSION"
          git push origin HEAD:$BRANCH
