name: Pre CI
on:
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  pre-ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build (optional)
        run: npm run build --if-present
